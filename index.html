<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: white;
}

/* AUTH */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  width: 320px;
  padding: 30px;
  border-radius: 20px;
  background: var(--glass);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px);
}

.box input {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.box button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
  flex-direction: column;
  height: 100vh;
}

.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.8);
  border-bottom: 1px solid #222;
}

.feed {
  flex: 1;
  margin-top: 60px;
  margin-bottom: 100px;
  overflow-y: auto;
  padding: 12px;
}

.post {
  background: var(--glass);
  border: 1px solid var(--border);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 12px;
}

.composer {
  position: fixed;
  bottom: 70px;
  width: 100%;
  display: flex;
  padding: 10px;
  gap: 10px;
}

.composer input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: #111;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <div class="box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signupBtn">Signup</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <span>KUDASAI</span>
    <span id="userTag"></span>
  </div>

  <div id="feed" class="feed"></div>

  <div class="composer">
    <input id="postInput" placeholder="Post something...">
    <button id="postBtn">➤</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goTasks()">💰</div>
    <div onclick="goProfile()">👤</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
