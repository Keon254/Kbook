<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* ===== BASE ===== */
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: #fff;
}

/* ===== GLASS EFFECT ===== */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.08);
}

/* ===== AUTH ===== */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  padding: 40px;
  width: 300px;
  text-align: center;
}

.auth input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: #fff;
}

.auth button {
  width: 100%;
  margin-top: 15px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #fff, #aaa);
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.auth button:hover {
  transform: scale(1.05);
}

/* ===== HEADER ===== */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #222;
}

/* ===== FEED ===== */
.feed {
  margin-top: 80px;
  margin-bottom: 100px;
  padding: 15px;
}

.post {
  padding: 15px;
  margin-bottom: 15px;
  transition: 0.3s;
}

.post:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 20px rgba(255,255,255,0.1);
}

/* ===== POST BOX ===== */
.postBox {
  position: fixed;
  bottom: 80px;
  width: 100%;
  padding: 10px;
  display: flex;
  gap: 10px;
}

.postBox input {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: #fff;
}

.postBox button {
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #fff, #888);
  color: black;
}

/* ===== NAV ===== */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 15px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.8);
  font-size: 22px;
}

.nav div {
  cursor: pointer;
  transition: 0.2s;
}

.nav div:hover {
  transform: scale(1.2);
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <div class="auth-box glass">
    <h1>KUDASAI</h1>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Sign Up</button>
    <button id="loginEmailBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="header">
    <b>KUDASAI</b>
    <span id="balance">K0</span>
  </div>

  <div id="feed" class="feed"></div>

  <div class="postBox">
    <input id="postInput" placeholder="Speak your mind...">
    <button id="postBtn">➤</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goTasks()">💰</div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
