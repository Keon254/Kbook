<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI GOD MODE</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #000;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: white;
}

/* APP */
#app { display: none; }

/* AUTH */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  padding: 25px;
  border-radius: 20px;
  background: var(--glass);
}

/* FEED */
.feed { padding: 70px 10px 120px; }

.post {
  background: var(--glass);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.actions {
  display: flex;
  gap: 10px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: #111;
}

/* PANEL */
.panel {
  padding: 20px;
}
</style>
</head>

<body>

<div class="auth">
  <div class="box">
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password"><br>
    <button id="signupBtn">Signup</button>
    <button id="loginEmailBtn">Login</button>
  </div>
</div>

<div id="app">

  <div id="feed" class="feed"></div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goEarn()">💰</div>
    <div onclick="goProfile()">👤</div>
    <div onclick="goAdmin()">⚙️</div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
