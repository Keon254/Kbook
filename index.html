<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* ===== GLOBAL ===== */
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --accent: #00d4ff;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: white;
}

/* ===== SIDEBAR ===== */
.sidebar {
  padding: 20px;
  border-right: 1px solid #111;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
}

.logo {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 25px;
  background: linear-gradient(135deg,#fff,#555);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.nav-item {
  padding: 12px;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: 0.2s;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
}

/* ===== FEED ===== */
.feed {
  padding: 20px;
  overflow-y: auto;
}

/* ===== POST BOX ===== */
.post:first-child {
  display: flex;
  gap: 10px;
  align-items: center;
}

.post:first-child input {
  flex: 1;
}

/* ===== POSTS ===== */
.post {
  background: linear-gradient(145deg,#0a0a0a,#111);
  border: 1px solid var(--border);
  padding: 18px;
  border-radius: 18px;
  margin-bottom: 16px;
  transition: 0.25s;
}

.post:hover {
  transform: translateY(-3px);
  border-color: rgba(255,255,255,0.15);
}

/* HEADER */
.username {
  color: var(--accent);
  font-weight: bold;
  margin-bottom: 4px;
}

/* CONTENT */
.post div {
  margin-top: 6px;
}

/* MEDIA */
.post img,
.post video {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
}

/* ===== ACTION BUTTONS ===== */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 12px;
}

.actions button {
  background: #0f0f0f;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  transition: 0.2s;
}

.actions button:hover {
  background: #1a1a1a;
  transform: scale(1.05);
}

/* LIKE BUTTON SPECIAL */
.actions button:first-child {
  color: #ff4d6d;
}

/* ===== RIGHT PANEL ===== */
.rightbar {
  padding: 20px;
  border-left: 1px solid #111;
}

.panel-box {
  background: linear-gradient(145deg,#0a0a0a,#111);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 15px;
  border: 1px solid var(--border);
}

/* ===== INPUT ===== */
input {
  background: #0f0f0f;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 12px;
  color: white;
}

button {
  background: linear-gradient(135deg,#222,#111);
  border: 1px solid #333;
  color: white;
  border-radius: 10px;
  padding: 10px 14px;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-thumb {
  background: #222;
  border-radius: 10px;
}

<!-- AUTH -->
<div class="auth">
  <div class="auth-box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">K</div>
      <div class="nav-item" onclick="goHome()">Home</div>
      <div class="nav-item" onclick="goChat()">Chat</div>
      <div class="nav-item" onclick="goNotifications()">Notifications</div>
    </div>

    <!-- FEED -->
    <div class="feed">

      <!-- POST BOX -->
      <div class="post">
        <input id="postInput" placeholder="What's on your mind?" />
        <input type="file" id="imageInput">
        <input type="file" id="videoInput">
        <button id="postBtn">Post</button>
      </div>

      <div id="feed"></div>
    </div>

    <!-- RIGHT -->
    <div class="rightbar">
      <h3>🔥 KUDASAI</h3>
      <p>Social + Earn + AI</p>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
// ENTER TO POST
document.addEventListener("DOMContentLoaded",()=>{
  const input = document.getElementById("postInput");

  input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
      e.preventDefault();
      document.getElementById("postBtn").click();
    }
  });
});
</script>

</body>
</html>
