<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #000;
  color: #fff;
}

/* AUTH SCREEN */
.auth {
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
}

.auth input {
  width: 250px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  outline: none;
}

.auth button {
  width: 270px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: white;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* APP */
#app {
  display: none;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  background: #000;
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #222;
}

/* FEED */
.feed {
  margin-top: 70px;
  margin-bottom: 90px;
  padding: 10px;
}

.post {
  background: #111;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* POST BOX */
.postBox {
  position: fixed;
  bottom: 70px;
  width: 100%;
  display: flex;
  gap: 10px;
  padding: 10px;
  background: #000;
}

.postBox input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <h1>KUDASAI</h1>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button id="signupBtn">Sign Up</button>
  <button id="loginEmailBtn">Login</button>
</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <b>KUDASAI</b>
    <span id="balance">K0</span>
  </div>

  <div id="feed" class="feed"></div>

  <div class="postBox">
    <input id="postInput" placeholder="Share something...">
    <button id="postBtn">Post</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goTasks()">💰</div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
