<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* =========================
   ULTRA UI SYSTEM CORE
========================= */

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: white;
}

/* APP LAYOUT */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* AUTH */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 30px;
}

/* INPUTS */
input {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
}

/* BUTTONS */
button {
  padding: 10px 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#fff,#aaa);
  color: black;
  cursor: pointer;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 14px;
  display: flex;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  background: rgba(0,0,0,0.6);
  border-bottom: 1px solid #222;
}

/* FEED */
.feed {
  margin-top: 70px;
  padding: 15px;
  flex: 1;
}

.post {
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 16px;
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-3px);
  box-shadow: 0 0 25px rgba(255,255,255,0.08);
}

/* POST BAR */
.post-bar {
  position: fixed;
  bottom: 70px;
  width: 100%;
  display: flex;
  gap: 10px;
  padding: 10px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  border-top: 1px solid #222;
  font-size: 20px;
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <div class="card">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Sign Up</button>
    <button id="loginEmailBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="app-shell" style="display:none;">

  <!-- HEADER -->
  <div class="header">
    <b>KUDASAI</b>
    <span id="balance">K0</span>
  </div>

  <!-- FEED -->
  <div id="feed" class="feed"></div>

  <!-- POST BAR -->
  <div class="post-bar">
    <input id="postInput" placeholder="What's happening?">
    <button id="postBtn">➤</button>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goTasks()">💰</div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
