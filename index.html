<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI GOD MODE</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #000;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #fff;
  --muted: rgba(255,255,255,0.6);
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: radial-gradient(circle at top, #0a0a0a, #000);
  color: var(--text);
}

/* ================= AUTH ================= */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  width: 320px;
  padding: 30px;
  border-radius: 20px;
  background: var(--glass);
  backdrop-filter: blur(18px);
  border: 1px solid var(--border);
  text-align: center;
}

.box h2 {
  margin-bottom: 15px;
}

.box input {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
  outline: none;
}

.box button {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

#signupBtn {
  background: white;
  color: black;
}

#loginEmailBtn {
  background: #333;
  color: white;
}

/* ================= APP ================= */
#app {
  display: none;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
  font-weight: bold;
  z-index: 10;
}

/* FEED */
.feed {
  flex: 1;
  margin-top: 60px;
  margin-bottom: 80px;
  padding: 12px;
  overflow-y: auto;
}

.post {
  background: var(--glass);
  border: 1px solid var(--border);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 12px;
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-2px);
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.actions button {
  padding: 6px 10px;
  font-size: 12px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(10px);
  border-top: 1px solid #222;
  font-size: 20px;
}

/* PANEL */
.panel {
  padding: 20px;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  color: var(--muted);
}
</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <div class="box">
    <h2>KUDASAI</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Signup</button>
    <button id="loginEmailBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="header">KUDASAI</div>

  <!-- FEED -->
  <div id="feed" class="feed"></div>

  <!-- NAV -->
  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goEarn()">💰</div>
    <div onclick="goProfile()">👤</div>
    <div onclick="goAdmin()">⚙️</div>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
