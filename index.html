<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KUDASAI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- AUTH -->
<div class="auth" id="authScreen">

  <div class="auth-box">

    <div class="logo">K</div>

    <h1>KUDASAI</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>

  </div>

</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <div class="logo small">K</div>
      <h2>KUDASAI</h2>
    </div>

    <div class="nav-item active-nav" id="nav-home" onclick="goHome()">🏠 Home</div>
    <div class="nav-item" id="nav-profile" onclick="goProfile()">👤 Profile</div>
    <div class="nav-item" id="nav-notifs" onclick="goNotifications()" style="position:relative">
      🔔 Notifications
      <span id="notifBadge" class="notif-badge" style="display:none"></span>
    </div>
    <div class="nav-item" id="nav-bookmarks" onclick="goBookmarks()">🔖 Bookmarks</div>
    <div class="nav-item" id="nav-messages" onclick="goMessages()" style="position:relative">
      💬 Messages
      <span id="dmBadge" class="notif-badge" style="display:none"></span>
    </div>
    <div class="nav-item" id="nav-jobs" onclick="goJobs()">💼 Jobs</div>
    <div class="nav-item" id="nav-surveys" onclick="goSurveys()">📋 Surveys</div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="topbar">

      <input
        class="search"
        id="searchInput"
        placeholder="Search posts or @users…"
        oninput="handleSearch(this.value)"
      >

      <div id="userTag">@user</div>

    </div>

    <!-- COMPOSER -->
    <div class="composer" id="composer">

      <textarea
        id="postInput"
        placeholder="What's happening?"
      ></textarea>

      <div class="composer-actions">

        <label class="file-label">📷 Photo <input type="file" id="imageInput" accept="image/*" style="display:none"></label>
        <label class="file-label">🎥 Video <input type="file" id="videoInput" accept="video/*" style="display:none"></label>

        <button id="postBtn">Post</button>

      </div>

    </div>

    <!-- FEED TABS -->
    <div class="feed-tabs" id="feedTabs">
      <button class="tab-btn tab-active" id="tabForYou"   onclick="switchTab('forYou')">For You</button>
      <button class="tab-btn"            id="tabFollowing" onclick="switchTab('following')">Following</button>
    </div>

    <!-- FEED -->
    <div id="feed"></div>

  </main>

  <!-- RIGHT -->
  <aside class="rightbar">

    <div class="panel">
      <h3>🔥 Trending</h3>
      <div id="trendingList">
        <p style="color:#555;font-size:13px">Loading…</p>
      </div>
    </div>

    <div class="panel">
      <h3>👥 Who to Follow</h3>
      <div id="whoToFollow">
        <p style="color:#555;font-size:13px">Loading…</p>
      </div>
    </div>

    <div class="panel">
      <h3>💰 Balance</h3>
      <div id="balanceText">K0</div>
    </div>

  </aside>

</div>

<script src="script.js"></script>

</body>
</html>
