<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --text: #fff;
  --muted: rgba(255,255,255,0.6);
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* AUTH */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  width: 340px;
  padding: 30px;
  border-radius: 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  text-align: center;
}

.auth-box input {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.auth-box button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-weight: bold;
}

/* APP */
#app {
  display: none;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
}

/* FEED */
.feed {
  margin-top: 60px;
  margin-bottom: 120px;
  padding: 12px;
  max-width: 600px;
  margin-left: auto;
  margin-right: auto;
}

/* PROFILE */
.profile-card {
  background: var(--glass);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
}

.avatar {
  width: 90px;
  height: 90px;
  border-radius: 50%;
  object-fit: cover;
  margin-bottom: 10px;
  border: 2px solid white;
}

.stats {
  display: flex;
  justify-content: space-around;
  margin-top: 10px;
}

.stat {
  text-align: center;
}

.edit-box input {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.edit-box button {
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: white;
  color: black;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 12px;
  background: #111;
}
</style>
</head>

<body>

<div class="auth">
  <div class="auth-box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signupBtn">Signup</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<div id="app">
  <div class="header">
    <span>KUDASAI</span>
    <span id="userTag"></span>
  </div>

  <div id="feed" class="feed"></div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goProfile()">👤</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
