<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="auth-box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">KUDASAI</div>
    <div class="nav-icons">
      <span onclick="goHome()">🏠</span>
      <span onclick="goExplore()">🔥</span>
      <span onclick="goTasks()">💰</span>
      <span onclick="goProfile()">👤</span>
    </div>
    <div id="userTag"></div>
  </div>

  <!-- FEED -->
  <div id="feed" class="feed"></div>

  <!-- COMPOSER -->
  <div class="composer">
    <input id="postInput" placeholder="What’s happening?">
    <button id="postBtn">➤</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
