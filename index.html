<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#000;
  --glass:rgba(255,255,255,0.05);
  --border:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#000;
  color:#fff;
}

/* AUTH */
.auth{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  background:var(--glass);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(20px);
  width:320px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
  background:#111;
  color:#fff;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  cursor:pointer;
}

/* APP */
#app{
  display:none;
}

/* HEADER */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#000;
  border-bottom:1px solid #222;
  z-index:10;
}

/* FEED */
.feed{
  margin-top:70px;
  margin-bottom:100px;
  padding:10px;
}

/* POST */
.post{
  background:var(--glass);
  border:1px solid var(--border);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
}

.post img{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* COMPOSER */
.composer{
  position:fixed;
  bottom:70px;
  width:100%;
  display:flex;
  gap:10px;
  padding:10px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:15px;
  background:#000;
  border-top:1px solid #222;
}
</style>
</head>

<body>

<div class="auth">
  <div class="box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<div id="app">

  <div class="header">
    <div>KUDASAI</div>
    <div id="userTag"></div>
  </div>

  <div id="feed" class="feed"></div>

  <div class="composer">
    <input id="postInput" placeholder="Say something...">
    <input type="file" id="imageInput">
    <button id="postBtn">Post</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goJobs()">💼</div>
    <div onclick="goSurvey()">💰</div>
    <div onclick="goNotifications()">🔔</div>
    <div onclick="openAI()">🤖</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
