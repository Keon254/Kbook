<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
/* =========================
   🌌 DESIGN SYSTEM
========================= */
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --accent: #00d4ff;
}

/* =========================
   GLOBAL
========================= */
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: white;
  overflow-x: hidden;
}

/* =========================
   AUTH + STARS
========================= */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.stars, .stars2, .stars3 {
  position: absolute;
  width: 200%;
  height: 200%;
}

.stars {
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  animation: moveStars 120s linear infinite;
}

.stars2 {
  background: radial-gradient(white 2px, transparent 2px);
  background-size: 6px 6px;
  animation: moveStars 80s linear infinite;
}

.stars3 {
  background: radial-gradient(white 3px, transparent 3px);
  background-size: 10px 10px;
  animation: moveStars 50s linear infinite;
}

@keyframes moveStars {
  from { transform: translateY(0); }
  to { transform: translateY(-50%); }
}

/* AUTH BOX */
.auth-box {
  width: 340px;
  padding: 35px;
  border-radius: 20px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  text-align: center;
  z-index: 2;
}

.auth-box input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
}

.auth-box button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  background: linear-gradient(135deg,#7c5cff,#00d4ff);
  color: white;
}

/* =========================
   APP LAYOUT
========================= */
#app {
  display: none;
  height: 100vh;
}

/* MAIN GRID */
.main {
  display: grid;
  grid-template-columns: 240px 1fr 300px;
  height: 100%;
}

/* =========================
   SIDEBAR
========================= */
.sidebar {
  padding: 20px;
  background: rgba(255,255,255,0.03);
  border-right: 1px solid var(--border);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logo {
  font-size: 22px;
  font-weight: 900;
  background: linear-gradient(135deg,#fff,#777);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 20px;
}

.nav-item {
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.nav-item:hover {
  background: rgba(255,255,255,0.05);
}

/* =========================
   FEED COLUMN
========================= */
.feed {
  overflow-y: auto;
  padding: 16px;
}

/* =========================
   POST CARD
========================= */
.post {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  backdrop-filter: blur(20px);
  transition: 0.2s;
}

.post:hover {
  transform: translateY(-3px);
}

/* POST HEADER */
.post-header {
  display: flex;
  gap: 10px;
  align-items: center;
}

.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg,#444,#999);
}

.avatar.big {
  width: 80px;
  height: 80px;
}

/* TEXT */
.username {
  font-weight: bold;
  color: var(--accent);
}

.time {
  font-size: 12px;
  opacity: 0.6;
}

.post-content {
  margin-top: 10px;
  font-size: 15px;
  line-height: 1.5;
}

/* MEDIA */
.post img,
.post video {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.actions button {
  background: #111;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 6px 12px;
  cursor: pointer;
  color: white;
  transition: 0.2s;
}

.actions button:hover {
  background: #222;
  transform: scale(1.05);
}

/* =========================
   RIGHT PANEL
========================= */
.rightbar {
  padding: 15px;
  background: rgba(255,255,255,0.03);
  border-left: 1px solid var(--border);
  backdrop-filter: blur(20px);
}

.panel-box {
  background: rgba(255,255,255,0.05);
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 10px;
}

/* =========================
   COMPOSER
========================= */
.composer {
  position: fixed;
  bottom: 0;
  left: 240px;
  right: 300px;
  display: flex;
  gap: 10px;
  padding: 12px;
  background: rgba(0,0,0,0.9);
  border-top: 1px solid #222;
}

.composer input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

/* =========================
   SCROLLBAR
========================= */
::-webkit-scrollbar {
  width: 6px;
}

::-webkit-scrollbar-thumb {
  background: #222;
  border-radius: 10px;
}

/* =========================
   MOBILE FIX
========================= */
@media(max-width: 900px){
  .main{
    grid-template-columns: 1fr;
  }

  .sidebar, .rightbar{
    display: none;
  }

  .composer{
    left: 0;
    right: 0;
  }
}</style>
</head>

<body>

<!-- ================= AUTH ================= -->
<div class="auth">
  <div class="auth-box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password">
    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app">
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">K</div>

      <div class="nav-item" onclick="goHome()">🏠 Home</div>
      <div class="nav-item" onclick="goProfile()">👤 Profile</div>
      <div class="nav-item" onclick="goChat()">💬 Chat</div>
      <div class="nav-item" onclick="goJobs()">💼 Jobs</div>
      <div class="nav-item" onclick="goNotifications()">🔔 Notifications</div>
      <div class="nav-item" onclick="openAI()">🤖 AI</div>
    </div>

    <!-- FEED -->
    <div class="feed">

      <!-- 🔥 COMPOSER (POST BOX FIXED) -->
      <div class="post">
        <input id="postInput" placeholder="What's on your mind?" />
        <button id="postBtn">Post</button>
      </div>

      <!-- POSTS WILL LOAD HERE -->
      <div id="feed"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="rightbar">
      <div class="panel-box">
        <h3>🔥 Trending</h3>
        <p>#Kudasai</p>
      </div>

      <div class="panel-box">
        <h3>💰 Balance</h3>
        <p id="balance">0</p>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
/* =========================
   🔥 ENTER TO POST FIX
========================= */
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("postInput");

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      document.getElementById("postBtn").click();
    }
  });
});
</script>

</body>
</html>
