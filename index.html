<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="/Kbook/css/style.css">
</head>

<body>

<!-- AUTH -->
<div class="auth" id="auth">
  <div class="auth-box">
    <h1>KUDASAI</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>

    <p class="small">No stress — login optional system coming</p>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <span>KUDASAI</span>
    <span id="userTag"></span>
  </div>

  <div id="feed" class="feed"></div>

  <div class="composer">
    <input id="postInput" placeholder="Post anything...">
    <button id="postBtn">➤</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goTasks()">💰</div>
    <div onclick="goProfile()">👤</div>
    <div onclick="goAdmin()">⚙️</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
