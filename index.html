<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* ================= DESIGN ================= */
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.08);
  --accent: #00d4ff;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: white;
}

/* AUTH */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.auth-box {
  padding: 30px;
  border-radius: 20px;
  background: var(--glass);
  border: 1px solid var(--border);
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

button {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #222;
  color: white;
  cursor: pointer;
}

/* APP */
#app { display:none; height:100vh; }

.main {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  height: 100%;
}

/* SIDEBAR */
.sidebar {
  padding: 20px;
  border-right: 1px solid #222;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  margin-bottom: 20px;
}

.nav-item {
  padding: 10px;
  cursor: pointer;
}

/* FEED */
.feed {
  padding: 15px;
  overflow-y: auto;
}

/* POST */
.post {
  background: var(--glass);
  border: 1px solid var(--border);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

.username { color: var(--accent); }

.post img, .post video {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* RIGHTBAR */
.rightbar {
  padding: 15px;
  border-left: 1px solid #222;
}

/* MOBILE */
@media(max-width:900px){
  .main{ grid-template-columns:1fr; }
  .sidebar,.rightbar{ display:none; }
}

</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <div class="auth-box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">K</div>
      <div class="nav-item" onclick="goHome()">Home</div>
      <div class="nav-item" onclick="goChat()">Chat</div>
      <div class="nav-item" onclick="goNotifications()">Notifications</div>
    </div>

    <!-- FEED -->
    <div class="feed">

      <!-- POST BOX -->
      <div class="post">
        <input id="postInput" placeholder="What's on your mind?" />
        <input type="file" id="imageInput">
        <input type="file" id="videoInput">
        <button id="postBtn">Post</button>
      </div>

      <div id="feed"></div>
    </div>

    <!-- RIGHT -->
    <div class="rightbar">
      <h3>🔥 KUDASAI</h3>
      <p>Social + Earn + AI</p>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
// ENTER TO POST
document.addEventListener("DOMContentLoaded",()=>{
  const input = document.getElementById("postInput");

  input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
      e.preventDefault();
      document.getElementById("postBtn").click();
    }
  });
});
</script>

</body>
</html>
