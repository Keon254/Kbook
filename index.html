<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --text: #fff;
  --muted: rgba(255,255,255,0.6);
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* AUTH */
.auth {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  width: 340px;
  padding: 35px;
  border-radius: 22px;
  background: var(--glass);
  backdrop-filter: blur(20px);
  border: 1px solid var(--border);
}

.box input {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
}

.box button {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg,#fff,#bbb);
}

/* APP */
#app {
  display: none;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 16px;
  display: flex;
  justify-content: space-between;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid #222;
}

/* FEED */
.feed {
  flex: 1;
  margin-top: 70px;
  margin-bottom: 110px;
  overflow-y: auto;
  padding: 12px;
}

/* POST CARD (UPGRADED) */
.post {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
}

/* USER ROW */
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.avatar {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #222;
}

.username {
  font-weight: bold;
}

.time {
  font-size: 12px;
  color: var(--muted);
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* PROFILE */
.profile {
  text-align: center;
}

.profile .avatar {
  width: 80px;
  height: 80px;
  margin: auto;
}

.profile h2 {
  margin-top: 10px;
}

/* COMPOSER */
.composer {
  position: fixed;
  bottom: 80px;
  width: 100%;
  display: flex;
  gap: 10px;
  padding: 10px;
}

.composer input {
  flex: 1;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: #111;
  color: white;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 14px;
  background: rgba(0,0,0,0.9);
  border-top: 1px solid #222;
}

.btn {
  padding: 8px 12px;
  border-radius: 10px;
  background: #222;
  border: none;
  color: white;
}
</style>
</head>

<body>

<div class="auth">
  <div class="box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password">
    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<div id="app">

  <div class="header">
    <span>KUDASAI</span>
    <span id="userTag"></span>
  </div>

  <div id="feed" class="feed"></div>

  <div class="composer">
    <input id="postInput" placeholder="Say something...">
    <button id="postBtn">➤</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goTasks()">💰</div>
    <div onclick="goProfile()">👤</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
