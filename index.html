<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  padding: 15px;
  backdrop-filter: blur(10px);
  background: rgba(0,0,0,0.6);
  display: flex;
  justify-content: space-between;
}

/* POSTS */
.feed {
  margin-top: 70px;
  padding: 10px;
}

.post {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* FLOAT BUTTON */
.addPost {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #fff;
  color: #000;
  border-radius: 50%;
  width: 55px;
  height: 55px;
  font-size: 25px;
  border: none;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #111;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
}
</style>
</head>

<body>

<div class="header">
  <b>KUDASAI</b>
  <span id="balance">K0</span>
</div>

<div class="feed" id="feed"></div>

<button class="addPost">+</button>

<div class="nav">
  <div>🏠</div>
  <div>💰</div>
  <div>📊</div>
  <div>👤</div>
</div>

<script src="app.js"></script>
</body>
</html>
