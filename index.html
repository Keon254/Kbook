<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🌌 AUTH SCREEN -->
<div class="auth" id="auth">

  <!-- STARFIELD -->
  <div class="stars"></div>
  <div class="stars2"></div>
  <div class="stars3"></div>

  <div class="auth-box">
    <h1 class="logo">KUDASAI</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- 🚀 APP -->
<div id="app">

  <!-- LEFT SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">KUDASAI</div>
    <div id="userTag"></div>

    <div class="nav-item">🏠 Home</div>
    <div class="nav-item">🔥 Explore</div>
    <div class="nav-item">🔔 Notifications</div>
    <div class="nav-item">💬 Messages</div>
    <div class="nav-item">👤 Profile</div>

    <button class="create-btn">+ Create</button>
  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TIKTOK -->
    <section class="column tiktok" id="tiktokFeed"></section>

    <!-- TWITTER -->
    <section class="column twitter">
      <div class="composer">
        <input id="postInput" placeholder="What’s happening?">
        <button id="postBtn">Post</button>
      </div>
      <div id="feed"></div>
    </section>

    <!-- INSTAGRAM -->
    <section class="column instagram" id="igFeed"></section>

  </main>

  <!-- RIGHT PANEL -->
  <aside class="rightbar">
    <h3>Messages</h3>
    <div class="panel-box">No messages yet</div>

    <h3>Trending</h3>
    <div class="panel-box">#Kudasai 🔥</div>
  </aside>

</div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">KUDASAI</div>
    <div id="userTag"></div>
  </div>

  <!-- FEED -->
  <div id="feed" class="feed"></div>

  <!-- COMPOSER -->
  <div class="composer">
    <input id="postInput" placeholder="What’s happening?">
    <button id="postBtn">➤</button>
  </div>

  <!-- NAV -->
  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goProfile()">👤</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
