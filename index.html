<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>

/* ===== GLOBAL ===== */
:root {
  --bg: radial-gradient(circle at top, #0a0a0a, #000);
  --glass: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
  --accent: #00d4ff;
}

body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: var(--bg);
  color: white;
}

/* SIDEBAR */
.sidebar {
  padding: 20px;
  border-right: 1px solid #111;
  background: rgba(0,0,0,0.6);
}

/* FEED */
.feed {
  padding: 20px;
}

/* POSTS */
.post {
  background: #111;
  border: 1px solid #222;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

/* ACTIONS */
.actions {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

/* INPUT */
input {
  background: #0f0f0f;
  border: 1px solid #222;
  border-radius: 10px;
  padding: 12px;
  color: white;
}

button {
  background: #222;
  border: 1px solid #333;
  color: white;
  border-radius: 10px;
  padding: 10px;
}

</style>
</head>

<body>

<!-- AUTH -->
<div class="auth">
  <div class="auth-box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="main">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="logo">K</div>
      <div class="nav-item" onclick="goHome()">Home</div>
      <div class="nav-item" onclick="goChat()">Chat</div>
      <div class="nav-item" onclick="goNotifications()">Notifications</div>
    </div>

    <!-- FEED -->
    <div class="feed">

      <div class="post">
        <input id="postInput" placeholder="What's on your mind?" />
        <input type="file" id="imageInput">
        <input type="file" id="videoInput">
        <button id="postBtn">Post</button>
      </div>

      <div id="feed"></div>
    </div>

    <!-- RIGHT -->
    <div class="rightbar">
      <h3>🔥 KUDASAI</h3>
      <p>Social + Earn + AI</p>
    </div>

  </div>
</div>

<script src="script.js"></script>

<script>
document.addEventListener("DOMContentLoaded",()=>{
  const input = document.getElementById("postInput");

  input.addEventListener("keydown",(e)=>{
    if(e.key==="Enter"){
      e.preventDefault();
      document.getElementById("postBtn").click();
    }
  });
});
</script>

</body>
</html>
