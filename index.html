<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KUDASAI</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{
  margin:0;
  font-family:Inter,sans-serif;
  background:#000;
  color:#fff;
  overscroll-behavior:none;
}

/* AUTH */
.auth{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.box{
  padding:30px;
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  backdrop-filter:blur(20px);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#fff;
}

button{
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:#fff;
  cursor:pointer;
}

/* APP */
#app{ display:none; }

/* HEADER */
.header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#000;
  border-bottom:1px solid #222;
  z-index:10;
}

/* MAIN LAYOUT (NEW) */
.main{
  display:flex;
  margin-top:70px;
}

/* SIDEBAR */
.sidebar{
  width:200px;
}

/* RIGHTBAR */
.rightbar{
  width:200px;
}

/* FEED */
.feed{
  flex:1;
  padding:10px;
  scroll-snap-type:y mandatory;
  margin-bottom:100px;
}

/* POST */
.post{
  background:rgba(255,255,255,0.05);
  padding:15px;
  border-radius:15px;
  margin-bottom:10px;
  scroll-snap-align:start;
  transition:0.3s;
}

.post:active{
  transform:scale(0.98);
}

.post img, video{
  width:100%;
  border-radius:10px;
  margin-top:10px;
}

/* CHAT */
#chatBox{
  max-height:300px;
  overflow-y:auto;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:15px;
  background:#000;
}
</style>
</head>

<body>

<div class="auth">
  <div class="box">
    <h2>KUDASAI</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password">
    <button id="signupBtn">Sign Up</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<div id="app">

  <div class="header">
    <div>KUDASAI</div>
    <div id="userTag"></div>
  </div>

  <!-- NEW STRUCTURE ADDED HERE -->
  <div class="main">
    <div class="sidebar"></div>

    <div id="feed" class="feed"></div>

    <div class="rightbar"></div>
  </div>

  <div class="composer">
    <input id="postInput" placeholder="Say something...">
    <input type="file" id="imageInput">
    <input type="file" id="videoInput" accept="video/*">
    <button id="postBtn">Post</button>
  </div>

  <div class="nav">
    <div onclick="goHome()">🏠</div>
    <div onclick="goChat()">💬</div>
    <div onclick="goJobs()">💼</div>
    <div onclick="goNotifications()">🔔</div>
    <div onclick="openAI()">🤖</div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
