<!DOCTYPE html>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<body>

<!-- AUTH -->
<div class="auth" id="authScreen">

  <div class="stars"></div>

  <div class="auth-box">
    <div class="big-logo">K</div>

    <h1>KUDASAI</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->

    <div class="logo-wrap">
      <div class="logo-k">K</div>
      <div>
        <div class="logo-text">KUDASAI</div>
        <div class="logo-sub">Social OS</div>
      </div>
    </div>

    <div class="nav-menu">

      <div class="nav-item active" onclick="goHome()">
        🏠 Home
      </div>

      <div class="nav-item" onclick="goProfile()">
