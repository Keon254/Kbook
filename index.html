<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KUDASAI</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<!-- AUTH -->
<div class="auth" id="authScreen">

  <div class="auth-box">

    <div class="logo">K</div>

    <h1>KUDASAI</h1>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="signupBtn">Create Account</button>
    <button id="loginBtn">Login</button>

  </div>

</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">

    <div class="brand">
      <div class="logo small">K</div>
      <h2>KUDASAI</h2>
    </div>

    <div class="nav-item" onclick="goHome()">🏠 Home</div>
    <div class="nav-item" onclick="goProfile()">👤 Profile</div>
    <div class="nav-item" onclick="goNotifications()">🔔 Notifications</div>
    <div class="nav-item" onclick="goJobs()">💼 Jobs</div>
    <div class="nav-item" onclick="goSurveys()">📋 Surveys</div>

  </aside>

  <!-- MAIN -->
  <main class="main">

    <!-- TOP -->
    <div class="topbar">

      <input
        class="search"
        placeholder="Search KUDASAI"
      >

      <div id="userTag">@user</div>

    </div>

    <!-- COMPOSER -->
    <div class="composer">

      <textarea
        id="postInput"
        placeholder="What's happening?"
      ></textarea>

      <div class="composer-actions">

        <input type="file" id="imageInput">
        <input type="file" id="videoInput">

        <button id="postBtn">
          Post
        </button>

      </div>

    </div>

    <!-- FEED -->
    <div id="feed"></div>

  </main>

  <!-- RIGHT -->
  <aside class="rightbar">

    <div class="panel">
      <h3>🔥 Trending</h3>
      <p>#Kudasai</p>
      <p>#SocialOS</p>
    </div>

    <div class="panel">
      <h3>💰 Balance</h3>
      <div id="balanceText">K0</div>
    </div>

  </aside>

</div>

<script src="js/core.js"></script>
<script src="js/auth.js"></script>
<script src="js/feed.js"></script>
<script src="js/post.js"></script>
<script src="js/likes.js"></script>
<script src="js/comments.js"></script>
<script src="js/profile.js"></script>
<script src="js/notifications.js"></script>
<script src="js/jobs.js"></script>
<script src="js/surveys.js"></script>
<script src="js/realtime.js"></script>
<script src="js/ui.js"></script>

</body>
</html>
